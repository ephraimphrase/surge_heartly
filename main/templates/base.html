<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surge Heartly - AI Health Prediction</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap"
        rel="stylesheet">

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-9ndCyUaIbzAi2FUVXJi0CjmCapSmO7SnpJef0486qhLnuZ2cdeRhO02iuK6FUUVM" crossorigin="anonymous">

    <style>
        :root {
            /* Modern Medical Palette */
            --bg-color: #f4f7f6;
            --primary-blue: #2b5876;
            --primary-gradient: linear-gradient(135deg, #2b5876 0%, #4e4376 100%);
            --card-bg: rgba(255, 255, 255, 0.95);
            --text-main: #2d3748;
            --text-muted: #718096;

            --border-radius-lg: 16px;
            --border-radius-md: 12px;
            --border-radius-sm: 8px;

            --shadow-soft: 0 10px 40px -10px rgba(43, 88, 118, 0.1);
            --shadow-hover: 0 20px 40px -10px rgba(43, 88, 118, 0.2);
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(78, 67, 118, 0.05), transparent 40%),
                radial-gradient(circle at bottom left, rgba(43, 88, 118, 0.05), transparent 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1,
        h2,
        h3,
        h4,
        .navbar-brand {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
        }

        /* Navbar Styling */
        .modern-navbar {
            background-color: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
            padding: 1rem 0;
            box-shadow: 0 4px 20px -10px rgba(0, 0, 0, 0.05);
        }

        .navbar-brand {
            color: var(--primary-blue) !important;
            font-size: 1.5rem;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .brand-icon {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 1.8rem;
        }

        /* Main Content Wrapper */
        .main-wrapper {
            flex-grow: 1;
            padding: 3rem 0;
        }

        /* Premium Card */
        .glass-card {
            background: var(--card-bg);
            border-radius: var(--border-radius-lg);
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: var(--shadow-soft);
            padding: 2.5rem;
            transition: var(--transition-smooth);
            backdrop-filter: blur(20px);
        }

        .glass-card:hover {
            box-shadow: var(--shadow-hover);
        }

        /* Forms */
        .form-label {
            font-weight: 500;
            color: var(--text-main);
            font-size: 0.9rem;
            margin-bottom: 0.4rem;
        }

        .form-control,
        .form-select {
            border-radius: var(--border-radius-sm);
            border: 1px solid #e2e8f0;
            padding: 0.75rem 1rem;
            font-size: 1rem;
            transition: var(--transition-smooth);
            background-color: #fafbfc;
        }

        .form-control:focus,
        .form-select:focus {
            background-color: #ffffff;
            border-color: #4e4376;
            box-shadow: 0 0 0 4px rgba(78, 67, 118, 0.1);
        }

        /* Buttons */
        .btn-gradient {
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: var(--border-radius-sm);
            padding: 0.8rem 2rem;
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: var(--transition-smooth);
            box-shadow: 0 4px 15px rgba(43, 88, 118, 0.3);
        }

        .btn-gradient:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(43, 88, 118, 0.4);
            color: white;
        }

        .btn-gradient:active {
            transform: translateY(0);
        }

        .btn-outline-custom {
            border: 2px solid var(--primary-blue);
            color: var(--primary-blue);
            background: transparent;
            border-radius: var(--border-radius-sm);
            font-family: 'Outfit', sans-serif;
            font-weight: 600;
            transition: var(--transition-smooth);
        }

        .btn-outline-custom:hover {
            background: var(--primary-blue);
            color: white;
        }

        /* Footer */
        .footer {
            text-align: center;
            padding: 2rem 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <!-- Beautiful Navbar -->
    <nav class="navbar navbar-expand-lg modern-navbar sticky-top">
        <div class="container">
            <a class="navbar-brand" href="/">
                <span class="brand-icon">♥</span>
                Surge Heartly
            </a>
            <span class="navbar-text ms-auto text-muted d-none d-sm-block" style="font-size: 0.9rem;">
                Advanced AI Health Prediction
            </span>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-wrapper">
        {% block content %}
        {% endblock content %}
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="mb-0">© 2026 Surge Heartly. Powered by Machine Learning.</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-geWF76RCwLtnZ8qwWowPQNguL3RmwHVBC9FhGdlKrxdiJJigb/j/68SIy3Te4Bkz"
        crossorigin="anonymous"></script>
</body>

</html>
